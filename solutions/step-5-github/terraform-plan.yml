name: Terraform Plan

on:
  pull_request:
    paths:
      - 'infrastructure/**'
      - '*.tf'
      - '*.tfvars'

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: infrastructure/production  # Azure production environment

      - name: Terraform Plan
        id: plan
        # Plans changes to Azure resources (PostgreSQL Flexible Server, VNet, Container Apps, etc.)
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan-output.txt
        working-directory: infrastructure/production  # Azure production environment
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('infrastructure/production/plan-output.txt', 'utf8');
            const truncated = planOutput.length > 60000 
              ? planOutput.substring(0, 60000) + '\n... (truncated)'
              : planOutput;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 📋 Terraform Plan Output\n\n\`\`\`\n${truncated}\n\`\`\`\n\n*Plan result: ${{ steps.plan.outcome }}*`
            });
