name: Step 0 # Start

# Triggers when the learner creates a repo from this template
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/0-start.yml'

permissions:
  contents: write
  actions: write
  issues: write

env:
  EXERCISE_TITLE: "Preventing Production Database Disasters"
  EXERCISE_TOOLKIT_REF: v0.7.0

jobs:
  start_exercise:
    name: Start Exercise
    uses: skills/exercise-toolkit/.github/workflows/start-exercise.yml@v0.7.0
    with:
      exercise-title: "Preventing Production Database Disasters"
      intro-message: |
        Welcome to this hands-on exercise! 🛡️

        You're about to experience what happens when AI-assisted infrastructure management goes wrong — and learn how to prevent it.

        **Based on a real incident:** An engineer used an AI coding agent to manage Terraform. Due to a missing state file and unrestricted agent access, `terraform destroy` wiped a production database containing **1.9 million rows** of student data accumulated over 2.5 years.

        In this exercise, you will:
        1. 🏗️ **Build a "production" environment** with a real database and 50K+ rows of data
        2. 💥 **Simulate the incident** — watch the failure chain unfold safely in Docker
        3. 🔧 **Practice recovery** — restore the database from backup
        4. 🔒 **Implement Azure guardrails** — resource locks and immutable backups
        5. 🛡️ **Implement GitHub guardrails** — CODEOWNERS, Actions workflows, and environments
        6. 🤖 **Configure Copilot CLI guardrails** — custom instructions and plan mode

        **Prerequisites:**
        - Docker Desktop installed and running
        - Terraform CLI installed (v1.0+)
        - Git CLI
        - (Optional) GitHub Copilot CLI for Step 6

        **Estimated time:** 1.5 - 2 hours

  enable_step_1:
    name: Enable Step 1
    needs: start_exercise
    runs-on: ubuntu-latest
    steps:
      - name: Enable Step 1 workflow
        run: gh workflow enable "Step 1"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Get response templates
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: ${{ env.EXERCISE_TOOLKIT_REF }}

      - name: Post Step 1 content
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ github.repository }}
          issue-number: ${{ needs.start_exercise.outputs.issue-number }}
          file: .github/steps/1-setup-production.md

      - name: Post watching message
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ github.repository }}
          issue-number: ${{ needs.start_exercise.outputs.issue-number }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: Disable start workflow
        run: gh workflow disable "${{ github.workflow }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
