name: Step 0 # Start

# Triggers when the learner creates a repo from this template
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/0-start.yml'

permissions:
  contents: write
  actions: write
  issues: write

env:
  EXERCISE_TITLE: "Preventing Production Database Disasters"
  EXERCISE_TOOLKIT_REF: v0.7.0

jobs:
  start_exercise:
    name: Start Exercise
    uses: skills/exercise-toolkit/.github/workflows/start-exercise.yml@v0.7.0
    with:
      exercise-title: "Preventing Production Database Disasters"
      intro-message: "You will experience what happens when AI-assisted infrastructure management goes wrong, and learn how to prevent it. Based on a real incident where terraform destroy wiped a production database with 1.9 million rows. You will build a production environment, simulate the incident, practice recovery, and implement Azure, GitHub, and Copilot CLI guardrails. Prerequisites: Docker Desktop, Terraform CLI (v1.0+), Git. Estimated time: 1.5-2 hours."

  enable_step_1:
    name: Enable Step 1
    needs: start_exercise
    runs-on: ubuntu-latest
    steps:
      - name: Enable Step 1 workflow
        run: gh workflow enable "Step 1"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Get response templates
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: ${{ env.EXERCISE_TOOLKIT_REF }}

      - name: Post Step 1 content
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ github.repository }}
          issue-number: ${{ needs.start_exercise.outputs.issue-number }}
          file: .github/steps/1-setup-production.md

      - name: Post watching message
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ github.repository }}
          issue-number: ${{ needs.start_exercise.outputs.issue-number }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: Disable start workflow
        run: gh workflow disable "${{ github.workflow }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
